# Render blueprint. Create the service and database from this file with one
# click at https://render.com (New, Blueprint, point at this repo).
services:
  - type: web
    name: entebbe-flight-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: entebbe-customs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"

databases:
  - name: entebbe-customs-db
    plan: free
